<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%" height="60" fill="none">
  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap');
    
    .typed-text {
      font-family: 'Fira Code', monospace;
      font-size: 22px;
      font-weight: 500;
    }
    
    /* Sequence switching for the phrases */
    .phrase-1 { animation: phrase1-cycle 12s step-end infinite; }
    .phrase-2 { animation: phrase2-cycle 12s step-end infinite; }
    .phrase-3 { animation: phrase3-cycle 12s step-end infinite; }
    
    @keyframes phrase1-cycle {
      0%, 33.33% { opacity: 1; visibility: visible; }
      33.34%, 100% { opacity: 0; visibility: hidden; }
    }
    @keyframes phrase2-cycle {
      0%, 33.33% { opacity: 0; visibility: hidden; }
      33.34%, 66.66% { opacity: 1; visibility: visible; }
      66.67%, 100% { opacity: 0; visibility: hidden; }
    }
    @keyframes phrase3-cycle {
      0%, 66.66% { opacity: 0; visibility: hidden; }
      66.67%, 99.99% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* Typing animation on clip-path width */
    .mask-rect {
      animation: type 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes type {
      0% { width: 0; }
      70%, 90% { width: 500px; }
      100% { width: 0; }
    }

    /* Cursor animation */
    .cursor {
      fill: #00f2fe;
      animation: blink 0.8s infinite step-end, cursor-move 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes blink {
      50% { opacity: 0; }
    }
    
    @keyframes cursor-move {
      0% { transform: translateX(0px); }
      70%, 90% { transform: translateX(370px); } /* Tailored to the character width */
      100% { transform: translateX(0px); }
    }
    ]]>
  </style>

  <defs>
    <clipPath id="clip">
      <rect class="mask-rect" x="0" y="0" width="0" height="60" />
    </clipPath>
  </defs>
  
  <!-- Text Wrapper with Clip-Path -->
  <g transform="translate(10, 0)" clip-path="url(#clip)">
    <!-- Phrase 1 -->
    <g class="phrase-1">
      <text x="0" y="38" class="typed-text" fill="#00f2fe">building modern web apps</text>
    </g>
    <!-- Phrase 2 -->
    <g class="phrase-2">
      <text x="0" y="38" class="typed-text" fill="#4facfe">architecting robust backends</text>
    </g>
    <!-- Phrase 3 -->
    <g class="phrase-3">
      <text x="0" y="38" class="typed-text" fill="#a18cd1">automating cloud pipelines</text>
    </g>
  </g>
  
  <!-- Cursor -->
  <rect class="cursor" x="10" y="20" width="3" height="22" />
</svg>
